<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCS 노쇠중심스펙트럼 평가</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --primary: #1a5276;
  --primary-light: #2980b9;
  --primary-pale: #d6eaf8;
  --accent: #e67e22;
  --accent-light: #fdebd0;
  --success: #27ae60;
  --danger: #c0392b;
  --bg: #f8f9fb;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e0e4e8;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR','IBM Plex Sans',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh; }

/* Header */
.header { background:linear-gradient(135deg, var(--primary) 0%, #1a6fa0 100%); color:#fff; padding:20px 0; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.15); }
.header-inner { max-width:800px; margin:0 auto; padding:0 20px; display:flex; align-items:center; justify-content:space-between; }
.header h1 { font-size:1.3rem; font-weight:700; letter-spacing:-0.02em; }
.header .subtitle { font-size:0.8rem; opacity:0.8; font-weight:300; }

/* Progress */
.progress-wrap { max-width:800px; margin:0 auto; padding:16px 20px 0; }
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg, var(--primary-light), var(--accent)); border-radius:3px; transition:width 0.5s ease; }
.progress-text { font-size:0.78rem; color:var(--text-light); margin-top:6px; text-align:right; }

/* Step indicators */
.steps-nav { max-width:800px; margin:0 auto; padding:12px 20px; display:flex; gap:4px; flex-wrap:wrap; }
.step-dot { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; color:var(--text-light); transition:all 0.3s; cursor:pointer; flex-shrink:0; }
.step-dot.active { border-color:var(--primary-light); background:var(--primary-light); color:#fff; }
.step-dot.done { border-color:var(--success); background:var(--success); color:#fff; }

/* Container */
.container { max-width:800px; margin:0 auto; padding:20px; }
.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:32px; margin-bottom:20px; border:1px solid var(--border); }
.card-title { font-size:1.2rem; font-weight:700; color:var(--primary); margin-bottom:4px; }
.card-subtitle { font-size:0.85rem; color:var(--text-light); margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--border); }

/* Domain badge */
.domain-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:0.72rem; font-weight:600; letter-spacing:0.03em; margin-bottom:12px; }
.domain-B { background:#d5f5e3; color:#1e8449; }
.domain-P { background:#d6eaf8; color:#1a5276; }
.domain-S { background:#fdebd0; color:#b9770e; }
.domain-F { background:#fadbd8; color:#922b21; }
.domain-CS { background:#f5eef8; color:#6c3483; }

/* Form elements */
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-weight:500; margin-bottom:6px; font-size:0.9rem; }
.form-group .hint { font-size:0.78rem; color:var(--text-light); margin-bottom:6px; }
input[type="text"], input[type="number"], select {
  width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px;
  font-size:0.95rem; font-family:inherit; transition:border 0.2s; background:#fff;
}
input:focus, select:focus { outline:none; border-color:var(--primary-light); box-shadow:0 0 0 3px rgba(41,128,185,0.1); }

/* Question item */
.q-item { padding:14px 16px; margin-bottom:8px; border-radius:8px; border:1.5px solid var(--border); transition:all 0.2s; background:#fff; }
.q-item:hover { border-color:var(--primary-pale); background:#fafcfe; }
.q-item.answered { border-color:var(--success); background:#f0faf4; }
.q-num { font-size:0.75rem; font-weight:600; color:var(--primary-light); margin-bottom:4px; }
.q-text { font-size:0.9rem; font-weight:500; margin-bottom:10px; line-height:1.5; }
.q-options { display:flex; flex-wrap:wrap; gap:8px; }
.q-opt { padding:7px 16px; border:1.5px solid var(--border); border-radius:20px; font-size:0.82rem;
  cursor:pointer; transition:all 0.2s; background:#fff; user-select:none; }
.q-opt:hover { border-color:var(--primary-light); background:var(--primary-pale); }
.q-opt.selected { border-color:var(--primary); background:var(--primary); color:#fff; font-weight:500; }

/* CCI checkboxes */
.cci-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.cci-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:0.85rem; }
.cci-item:hover { border-color:var(--primary-pale); }
.cci-item.checked { border-color:var(--primary-light); background:var(--primary-pale); }
.cci-item input { display:none; }
.cci-weight { font-size:0.7rem; font-weight:600; color:var(--accent); margin-left:auto; white-space:nowrap; }

/* Buttons */
.btn-row { display:flex; gap:12px; justify-content:space-between; margin-top:24px; }
.btn { padding:12px 32px; border:none; border-radius:8px; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:inherit; }
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-light); transform:translateY(-1px); box-shadow:var(--shadow); }
.btn-secondary { background:var(--border); color:var(--text); }
.btn-secondary:hover { background:#d0d4d8; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:#d35400; }
.btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* Gate */
.gate-box { background:var(--accent-light); border:2px solid var(--accent); border-radius:var(--radius); padding:24px; text-align:center; }
.gate-box .gate-q { font-size:1.05rem; font-weight:600; margin-bottom:16px; }
.gate-btns { display:flex; gap:16px; justify-content:center; }
.gate-btn { padding:14px 40px; border:2px solid var(--border); border-radius:8px; font-size:1rem; font-weight:600; cursor:pointer; background:#fff; transition:all 0.2s; }
.gate-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.gate-btn.yes { border-color:var(--danger); color:var(--danger); }
.gate-btn.yes:hover, .gate-btn.yes.selected { background:var(--danger); color:#fff; }
.gate-btn.no { border-color:var(--success); color:var(--success); }
.gate-btn.no:hover, .gate-btn.no.selected { background:var(--success); color:#fff; }

/* Quantitative optional section */
.quant-section { border:2px dashed var(--border); border-radius:var(--radius); padding:24px; margin-bottom:20px; }
.quant-section .section-label { display:flex; align-items:center; gap:8px; font-weight:600; color:var(--primary); margin-bottom:4px; }
.quant-section .optional-tag { font-size:0.7rem; background:var(--accent-light); color:var(--accent); padding:2px 10px; border-radius:10px; font-weight:600; }
.quant-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
.quant-field label { font-size:0.82rem; font-weight:500; }
.quant-field input { margin-top:4px; }

/* Results */
.result-card { text-align:center; padding:40px 32px; }
.result-card h2 { font-size:1.5rem; color:var(--primary); margin-bottom:8px; }
.radar-wrap { max-width:420px; margin:20px auto; }
.type-result { margin-top:24px; padding:20px; border-radius:var(--radius); text-align:left; }
.type-result h3 { font-size:1.1rem; margin-bottom:8px; }
.type-result p { font-size:0.9rem; color:var(--text-light); }
.score-table { width:100%; margin-top:20px; border-collapse:collapse; text-align:left; }
.score-table th { background:var(--primary); color:#fff; padding:10px 14px; font-size:0.82rem; }
.score-table td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:0.85rem; }
.score-table tr:nth-child(even) td { background:#f8f9fb; }

.hidden { display:none !important; }

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(100px); background:#2c3e50; color:#fff; padding:12px 28px; border-radius:8px; font-size:0.88rem; z-index:9999; transition:transform 0.4s ease; }
.toast.show { transform:translateX(-50%) translateY(0); }

/* Mobile */
@media(max-width:600px) {
  .card { padding:20px 16px; }
  .cci-grid { grid-template-columns:1fr; }
  .quant-grid { grid-template-columns:1fr; }
  .q-options { flex-direction:column; }
  .header h1 { font-size:1.1rem; }
  .btn { padding:10px 20px; font-size:0.88rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="subtitle">한국디지털헬스케어진흥재단・광주보건대학교・AI스포츠테크연구센터</div>
      <h1>FCS 노쇠중심스펙트럼 평가</h1>
      <div class="subtitle">BPS-FN Model | Frailty-Centered Spectrum</div>
    </div>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0%</div>
</div>

<div class="steps-nav" id="stepsNav"></div>

<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// GOOGLE SHEETS CONFIG
// ══════════════════════════════════════
// ★ 아래 URL을 본인의 Apps Script 웹앱 URL로 교체하세요
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-_oJrCtBe5iaOpqiUXZpUuPtcGkZ_MJlzenN9TevJOC6a7guYqTorkVoUqSmHm5n-/exec';

// ══════════════════════════════════════
// DATA MODEL
// ══════════════════════════════════════
const state = {
  step: 0,
  personal: { name:'', gender:'', age:'', height:'', weight:'' },
  answers: {},    // key: "sectionId-qIndex" => value (score)
  cciChecked: {}, // key: disease name => weight
  gateAnswer: null, // null | 'yes' | 'no'
  quant: {},
};

// ══════════════════════════════════════
// SURVEY DEFINITIONS
// ══════════════════════════════════════
const sections = [
  { id:'personal', title:'기본 정보 입력', domain:null, subtitle:'평가 대상자의 기본 정보를 입력해 주세요.' },

  // ── B Domain ──
  { id:'kfrail', title:'K-FRAIL (한국형 노쇠 선별도구)', domain:'B',
    subtitle:'5문항 | 0점(정상), 1-2점(전노쇠), 3-5점(노쇠)',
    questions:[
      { text:'지난 4주 동안 피곤하다고 느낀 적이 얼마나 자주 있었습니까?', opts:['항상/대부분 (1점)','가끔/거의없음 (0점)'], scores:[1,0] },
      { text:'쉬지 않고 10개의 계단을 오르는 데 어려움이 있습니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'쉬지 않고 300m를 걷는 데 어려움이 있습니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'의사로부터 진단받은 질병이 5개 이상입니까? (고혈압, 당뇨병, 암, 만성폐질환, 심근경색, 심부전, 협심증, 천식, 관절염, 뇌졸중, 신장질환)', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'지난 1년간 체중이 5% 이상 감소하였습니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
    ]
  },
  { id:'mna', title:'MNA-SF (간이영양평가)', domain:'B',
    subtitle:'6문항 | 12-14점(정상), 8-11점(위험), 0-7점(영양불량)',
    questions:[
      { text:'지난 3개월간 식욕부진, 소화불량, 저작/연하 곤란으로 식사량이 줄었습니까?', opts:['심한 감소 (0점)','중등도 감소 (1점)','변화없음 (2점)'], scores:[0,1,2] },
      { text:'지난 3개월간 체중 감소가 있었습니까?', opts:['3kg 이상 감소 (0점)','모름 (1점)','1-3kg 감소 (2점)','변화없음 (3점)'], scores:[0,1,2,3] },
      { text:'거동 상태는 어떻습니까?', opts:['침상/휠체어 (0점)','일어날 수 있으나 외출 못함 (1점)','외출 가능 (2점)'], scores:[0,1,2] },
      { text:'지난 3개월간 정신적 스트레스나 급성 질환을 앓은 적이 있습니까?', opts:['예 (0점)','아니오 (2점)'], scores:[0,2] },
      { text:'신경정신과적 문제가 있습니까?', opts:['심한 치매/우울 (0점)','경한 치매 (1점)','없음 (2점)'], scores:[0,1,2] },
      { text:'체질량지수(BMI)는 얼마입니까?', opts:['19 미만 (0점)','19-21 (1점)','21-23 (2점)','23 이상 (3점)'], scores:[0,1,2,3] },
    ]
  },
  { id:'cci', title:'CCI (찰슨동반질환지수)', domain:'B',
    subtitle:'17개 질환 | 해당 질환을 선택하세요 (가중치 자동 합산)', isCCI: true },
  { id:'meds', title:'복용 약물 수', domain:'B',
    subtitle:'현재 복용 중인 약물 개수를 입력하세요', isMeds: true },

  // ── P Domain ──
  { id:'gds', title:'GDS-SF (노인우울척도 단축형)', domain:'P',
    subtitle:'15문항 | 0-4점(정상), 5-9점(경증우울), 10-15점(중등도-중증우울)',
    questions:[
      { text:'현재 생활에 대체적으로 만족하십니까?', opts:['예 (0점)','아니오 (1점)'], scores:[0,1] },

      { text:'자신이 헛되이 살고 있다고 느끼십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'생활이 지루하게 느껴질 때가 많습니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },

      { text:'자신에게 불길한 일이 닥칠 것 같아 불안하십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },

      { text:'비슷한 나이의 다른 노인들보다 기억력이 더 나쁘다고 느끼십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'현재 살아있다는 것이 즐겁게 생각되십니까?', opts:['예 (0점)','아니오 (1점)'], scores:[0,1] },
      { text:'지금의 내 자신이 아무 쓸모없는 사람이라고 느끼십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'기력이 좋은 편이십니까?', opts:['예 (0점)','아니오 (1점)'], scores:[0,1] },
      { text:'지금 자신의 처지가 아무런 희망도 없다고 느끼십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
      { text:'자신이 다른 사람들의 처지보다 더 못하다고 생각하십니까?', opts:['예 (1점)','아니오 (0점)'], scores:[1,0] },
    ]
  },
  { id:'kmmse', title:'K-MMSE (한국형 간이정신상태검사)', domain:'P',
    subtitle:'30문항 | 안내에 따라 한 문항씩 평가하세요', isKMMSE: true,
    kmmseItems: [
      // 시간 지남력 (5)
      { group:'시간 지남력', instruction:'아래 질문을 하나씩 읽어주고, 정확히 답하면 1점입니다.', text:'올해는 몇 년도입니까?', hint:'정확한 연도를 답해야 합니다.' },

      { group:'장소 지남력', text:'여기는 무슨 구(군)입니까?', hint:'예: 북구, 동구 등' },
      { group:'장소 지남력', text:'여기는 무슨 동(읍/면)입니까?', hint:'정확한 행정구역을 답해야 합니다.' },

function getVisibleSections() {
  return sections.filter(s => {
    if (s.conditional && state.gateAnswer !== 'yes') return false;
    return true;
  });
}

function render() {
  const visible = getVisibleSections();
  const sec = visible[state.step];
  if (!sec) return;

  // Progress
  const pct = Math.round((state.step / (visible.length - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${state.step + 1} / ${visible.length}`;

  // Step dots
  const nav = document.getElementById('stepsNav');
  nav.innerHTML = visible.map((s, i) => {
    const cls = i === state.step ? 'active' : (i < state.step ? 'done' : '');
    const label = s.domain || (s.isResults ? '★' : (s.isGate ? '?' : (s.isQuant ? 'Q' : 'i')));
    return `<div class="step-dot ${cls}" onclick="goStep(${i})" title="${s.title}">${label}</div>`;
  }).join('');

  // Content
  const app = document.getElementById('app');
  if (sec.id === 'personal') app.innerHTML = renderPersonal();
  else if (sec.isCCI) app.innerHTML = renderCCI();
  else if (sec.isMeds) app.innerHTML = renderMeds();
  else if (sec.isKMMSE) app.innerHTML = renderKMMSE();
  else if (sec.isGate) app.innerHTML = renderGate();
  else if (sec.isQuant) app.innerHTML = renderQuant();
  else if (sec.isResults) { app.innerHTML = renderResults(); drawRadar(); }
  else app.innerHTML = renderQuestions(sec);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function domainBadge(d) {
  if (!d) return '';
  const labels = { B:'생물학적 Biological', P:'심리적 Psychological', S:'사회적 Social', F:'기능적 Functional', CS:'중추감작 Central Sensitization' };
  return `<span class="domain-badge domain-${d}">${d} | ${labels[d]||d}</span>`;
}

function renderPersonal() {
  const p = state.personal;
  return `<div class="card">
    <div class="card-title">기본 정보 입력</div>
    <div class="card-subtitle">평가 대상자의 기본 정보를 입력해 주세요. (필수)</div>
    <div class="form-group"><label>이름 *</label><input type="text" id="pName" value="${p.name}" placeholder="홍길동"></div>
    <div class="form-group"><label>성별 *</label>
      <select id="pGender"><option value="">선택</option><option ${p.gender==='남'?'selected':''}>남</option><option ${p.gender==='여'?'selected':''}>여</option></select></div>
    <div class="form-group"><label>연령 *</label><input type="number" id="pAge" value="${p.age}" placeholder="만 나이" min="0" max="120"></div>

function savePersonal() {
  const name = document.getElementById('pName').value.trim();
  const gender = document.getElementById('pGender').value;
  const age = document.getElementById('pAge').value;
  const height = document.getElementById('pHeight').value;
  const weight = document.getElementById('pWeight').value;
  if (!name || !gender || !age || !height || !weight) { showToast('모든 필수 항목을 입력해 주세요.'); return; }
  state.personal = { name, gender, age, height, weight };
  nextStep();
}

function renderQuestions(sec) {
  let html = `<div class="card">${domainBadge(sec.domain)}
    <div class="card-title">${sec.title}</div>
    <div class="card-subtitle">${sec.subtitle}</div>`;
  sec.questions.forEach((q, qi) => {
    const key = sec.id + '-' + qi;
    const answered = state.answers[key] !== undefined;
    html += `<div class="q-item ${answered?'answered':''}">
      <div class="q-num">${qi+1}/${sec.questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">`;
    q.opts.forEach((opt, oi) => {
      const sel = state.answers[key] === oi ? 'selected' : '';
      html += `<div class="q-opt ${sel}" onclick="answer('${key}',${oi})">${opt}</div>`;
    });
    html += `</div></div>`;
  });
  html += `<div class="btn-row">
    <button class="btn btn-secondary" onclick="prevStep()">← 이전</button>
    <button class="btn btn-primary" onclick="validateAndNext('${sec.id}')">다음 →</button>
  </div></div>`;
  return html;
}

function answer(key, optIdx) {
  state.answers[key] = optIdx;
  render();
}

function validateAndNext(secId) {
  const sec = sections.find(s => s.id === secId);
  if (sec && sec.questions) {
    for (let i = 0; i < sec.questions.length; i++) {
      if (state.answers[secId + '-' + i] === undefined) {
        showToast(`${i+1}번 문항에 응답해 주세요.`);
        return;
      }
    }
  }
  nextStep();
}

function toggleCCI(name, weight) {
  if (state.cciChecked[name]) delete state.cciChecked[name];
  else state.cciChecked[name] = weight;

}

    }

function saveKMMSE() {
  const sec = sections.find(s => s.id === 'kmmse');
  // Check all 30 items answered
  for (let i = 0; i < sec.kmmseItems.length; i++) {
    if (state.answers['kmmse-' + i] === undefined) {
      showToast(`${i+1}번 문항에 응답해 주세요.`);
      return;

  }
  // Calculate total and store as 'kmmse' for scoring compatibility
  let total = 0;
  sec.kmmseItems.forEach((_, i) => { total += state.answers['kmmse-' + i]; });
  state.answers['kmmse'] = total;
  nextStep();
}

// ══════════════════════════════════════
// SCORING
// ══════════════════════════════════════
function getSectionScore(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec || !sec.questions) return 0;
  let total = 0;
  sec.questions.forEach((q, i) => {
    const key = secId + '-' + i;
    const optIdx = state.answers[key];
    if (optIdx !== undefined) total += q.scores[optIdx];
  });
  return total;
}

function getSectionMax(secId) {
  const sec = sections.find(s => s.id === secId);
  if (!sec || !sec.questions) return 1;
  return sec.questions.reduce((a, q) => a + Math.max(...q.scores), 0);
}

// FI (Frailty Index) = total deficits / total possible deficits (0~1)
function calcFI() {
  let deficits = 0;
  let total = 0;

  // K-FRAIL: each item 0 or 1 deficit
  for (let i = 0; i < 5; i++) {
    const v = state.answers['kfrail-'+i];
    if (v !== undefined) { deficits += sections.find(s=>s.id==='kfrail').questions[i].scores[v]; total++; }
  }
  // MNA-SF: reverse (higher=better → deficit = 1 - score/max_per_item)
  const mnaSec = sections.find(s=>s.id==='mna');
  mnaSec.questions.forEach((q,i) => {
    const v = state.answers['mna-'+i];
    if (v !== undefined) { const maxQ = Math.max(...q.scores); deficits += 1 - q.scores[v]/maxQ; total++; }
  });
  // CCI: cap at 6 for deficit ratio
  const cciVal = Object.values(state.cciChecked).reduce((a,b)=>a+b,0);
  deficits += Math.min(cciVal/6, 1); total++;
  // Meds: >=5 = 1 deficit, else proportional
  const meds = state.answers['meds'] || 0;
  deficits += Math.min(meds/5, 1); total++;
  // GDS-SF: each item 0 or 1
  for (let i = 0; i < 15; i++) {
    const v = state.answers['gds-'+i];
    if (v !== undefined) { deficits += sections.find(s=>s.id==='gds').questions[i].scores[v]; total++; }
  }
  // K-MMSE: deficit = 1 - score/30
  const kmmse = state.answers['kmmse'];
  if (kmmse !== undefined) { deficits += 1 - kmmse/30; total++; }
  // Sleep: each item max 3
  const sleepSec = sections.find(s=>s.id==='sleep');
  sleepSec.questions.forEach((q,i) => {
    const v = state.answers['sleep-'+i];
    if (v !== undefined) { deficits += q.scores[v]/3; total++; }
  });
  // LSNS: reverse (higher=better)
  const lsnsSec = sections.find(s=>s.id==='lsns');
  lsnsSec.questions.forEach((q,i) => {
    const v = state.answers['lsns-'+i];
    if (v !== undefined) { deficits += 1 - q.scores[v]/5; total++; }
  });
  // Econ: higher=worse
  const econSec = sections.find(s=>s.id==='econ');
  econSec.questions.forEach((q,i) => {
    const v = state.answers['econ-'+i];
    if (v !== undefined) { const maxQ = Math.max(...q.scores); deficits += q.scores[v]/maxQ; total++; }
  });
  // Activity: reverse
  const actSec = sections.find(s=>s.id==='activity');
  actSec.questions.forEach((q,i) => {
    const v = state.answers['activity-'+i];
    if (v !== undefined) { const maxQ = Math.max(...q.scores); deficits += 1 - q.scores[v]/maxQ; total++; }
  });
  // MBI: reverse (100=independent)
  const mbiSec = sections.find(s=>s.id==='mbi');
  mbiSec.questions.forEach((q,i) => {
    const v = state.answers['mbi-'+i];
    if (v !== undefined) { const maxQ = Math.max(...q.scores); deficits += 1 - q.scores[v]/maxQ; total++; }
  });
  // IADL: reverse
  for (let i = 0; i < 8; i++) {
    const v = state.answers['iadl-'+i];
    if (v !== undefined) { deficits += 1 - sections.find(s=>s.id==='iadl').questions[i].scores[v]; total++; }
  }
  return total > 0 ? (deficits / total) : 0;
}

// K-MMSE sub-domain scores
function calcKMMSEsubs() {
  const sum = (start, end) => {
    let s = 0;
    for (let i = start; i <= end; i++) { s += (state.answers['kmmse-'+i] || 0); }
    return s;
  };
  return {
    time_orient: sum(0,4),      // 시간 지남력 /5
    place_orient: sum(5,9),     // 장소 지남력 /5
    memory_reg: sum(10,12),     // 기억등록 /3
    attention: sum(13,17),      // 주의집중 및 계산 /5
    memory_recall: sum(18,20),  // 기억회상 /3
    language: sum(21,29),       // 언어 및 시공간 /9
  };
}

function calcDomainScores() {
  // B: K-FRAIL(rev) + MNA-SF + CCI(rev) + Meds(rev)
  const kfrail = getSectionScore('kfrail');    // 0-5, higher=worse
  const mna = getSectionScore('mna');          // 0-14, higher=better
  const cci = Object.values(state.cciChecked).reduce((a,b)=>a+b,0); // higher=worse
  const meds = state.answers['meds'] || 0;

  const kfrailNorm = (1 - kfrail/5) * 100;
  const mnaNorm = (mna/14) * 100;
  const cciNorm = Math.max(0, (1 - cci/12)) * 100;
  const medsNorm = Math.max(0, (1 - meds/10)) * 100;
  const B = (kfrailNorm + mnaNorm + cciNorm + medsNorm) / 4;

  // P: GDS-SF(rev) + K-MMSE + Sleep(rev)
  const gds = getSectionScore('gds');          // 0-15, higher=worse
  const kmmse = state.answers['kmmse'] || 0;   // 0-30, higher=better
  const sleep = getSectionScore('sleep');       // 0-6, higher=worse

  const gdsNorm = (1 - gds/15) * 100;
  const kmmseNorm = (kmmse/30) * 100;
  const sleepNorm = (1 - sleep/6) * 100;
  const P = (gdsNorm + kmmseNorm + sleepNorm) / 3;

  // S: LSNS + Econ(rev) + Activity
  const lsns = getSectionScore('lsns');        // 0-15, higher=better
  const econ = getSectionScore('econ');         // 0-5, higher=worse
  const activity = getSectionScore('activity'); // 0-7, higher=better

  const lsnsNorm = (lsns/15) * 100;
  const econNorm = (1 - econ/5) * 100;
  const actNorm = (activity/7) * 100;
  const S = (lsnsNorm + econNorm + actNorm) / 3;

  // F: MBI + IADL
  const mbi = getSectionScore('mbi');          // 0-100
  const iadl = getSectionScore('iadl');        // 0-8

  const mbiNorm = mbi; // already 0-100
  const iadlNorm = (iadl/8) * 100;
  const F = (mbiNorm + iadlNorm) / 2;

  return { B: Math.round(B), P: Math.round(P), S: Math.round(S), F: Math.round(F),
    raw: { kfrail, mna, cci, meds, gds, kmmse, sleep, lsns, econ, activity, mbi, iadl } };
}

function classifyFCS(scores) {
  const threshold = 50;
  const collapsed = [];
  if (scores.B < threshold) collapsed.push('B');
  if (scores.P < threshold) collapsed.push('P');
  if (scores.S < threshold) collapsed.push('S');
  if (scores.F < threshold) collapsed.push('F');

  let type = '정상 범위';
  let intervention = '현재 특별한 취약 영역이 발견되지 않았습니다. 정기적 모니터링을 권장합니다.';
  let color = '#27ae60';

  if (collapsed.length >= 2) {
    type = '혼합형';
    intervention = '복수 영역 동시 취약 → 다학제 케어 플랜 필요';
    color = '#8e44ad';
  } else if (collapsed.includes('B')) {
    type = '신체취약형';
    intervention = '근력·파워·균형 3단계 운동, 단백질/에너지 보충';
    color = '#27ae60';
  } else if (collapsed.includes('P')) {
    const gds = getSectionScore('gds');
    const kmmse = state.answers['kmmse'] || 30;
    if (kmmse < 24 && gds < 5) {
      type = '인지/집행취약형';
      intervention = '이중과제 보행, 실행기능 훈련, 수면·약물 조정';
      color = '#2980b9';
    } else if (gds >= 5) {
      type = '정서취약형';
      intervention = '행동활성화, 사회적 리듬, 우울 스크리닝 후 연계';
      color = '#2980b9';
    } else {
      type = '심리적 취약형';
      intervention = 'K-MMSE/GDS-SF 세부 결과 확인 후 인지 또는 정서 중재 결정';
      color = '#2980b9';
    }
  } else if (collapsed.includes('S')) {
    type = '사회취약형';
    intervention = '사회참여 프로그램, 방문·커뮤니티 연계, 디지털 소통 지원';
    color = '#e67e22';
  } else if (collapsed.includes('F')) {
    type = '기능취약형 (신체취약형 연관)';
    intervention = 'ADL/IADL 기능 재활, 보행 훈련, 낙상 예방';
    color = '#c0392b';
  }

  // CS check
  let csType = null;
  if (state.gateAnswer === 'yes') {
    const csi = getSectionScore('csi');
    const pcs = getSectionScore('pcs');
    const tsk = getSectionScore('tsk');
    if (csi >= 40) {
      csType = { type: '중추감작형 (동반)', csi, pcs, tsk,
        intervention: '통증 교육·재평가, 점진적 노출·운동, 수면·정서 조절' };
    }
  }

  return { type, intervention, color, collapsed, csType };
}

      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    showToast('✅ Google Sheets에 저장되었습니다!');
  } catch (e) {
    showToast('⚠ 저장 실패: ' + e.message);
  }
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function nextStep() {
  const visible = getVisibleSections();
  if (state.step < visible.length - 1) { state.step++; render(); }
}
function prevStep() {
  if (state.step > 0) { state.step--; render(); }
}
function goStep(i) {
  if (i <= state.step) { state.step = i; render(); }
}
function resetAll() {
  state.step = 0;
  state.personal = { name:'', gender:'', age:'', height:'', weight:'' };
  state.answers = {};
  state.cciChecked = {};
  state.gateAnswer = null;
  state.quant = {};
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
render();
</script>
</body>
</html>
